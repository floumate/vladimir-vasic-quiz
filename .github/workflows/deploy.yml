name: Build & Deploy (docs + gh-pages)

# Na svaki push na main: build-uje app i osvežava OBE mete:
#  1) docs/ folder na main  (za "Deploy from a branch: main /docs")
#  2) gh-pages grana         (za "Deploy from a branch: gh-pages /(root)")
# Koja god opcija je izabrana u Pages podešavanjima - uvek je svež build.
# Sirov /src se nikad ne servira -> nema belog ekrana.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_MAKE_WEBHOOK_URL: ${{ secrets.VITE_MAKE_WEBHOOK_URL }}

      # 1) docs/ na main (commit gurnut sa GITHUB_TOKEN-om NE pokreće novi workflow)
      - name: Osveži docs/ na main
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "Nema promena u docs/."
          else
            git commit -m "Build docs [skip ci]"
            git push
          fi

      # 2) gh-pages grana (samo build, bez /src)
      - name: Push build na gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
