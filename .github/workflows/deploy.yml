name: Build to docs (GitHub Pages)

# Na svaki push na main: build-uje app u docs/ folder i komituje ga nazad na main.
# GitHub Pages servira "Deploy from a branch: main / docs" (statički build).
# Sirov /src se nikad ne servira -> nema belog ekrana.
#
# Napomena: commit koji workflow gurne sa GITHUB_TOKEN-om NE pokreće novi workflow
# (GitHub to namerno sprečava), pa nema beskonačne petlje.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Osveži docs/ iz build-a
        run: |
          rm -rf docs
          mv dist docs
          touch docs/.nojekyll

      - name: Komituj docs/ ako ima promena
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "Nema promena u docs/ - preskačem commit."
          else
            git commit -m "Build docs [skip ci]"
            git push
          fi
